name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Gate optional publishers on whether their secrets are configured. (Secrets
  # cannot be referenced directly in a job-level `if:`, so surface them as job
  # outputs here.)
  check:
    runs-on: ubuntu-latest
    outputs:
      has_brew: ${{ steps.c.outputs.has_brew }}
    steps:
      - id: c
        env:
          BREW: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: echo "has_brew=$([ -n "$BREW" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

  goreleaser:
    needs: check
    if: needs.check.outputs.has_brew == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25"
          cache: false
      - uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with contents:write on Framehood/homebrew-tap.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  # npm is published deliberately via the separate npm-publish.yml workflow — a tag
  # never auto-publishes to the registry.
